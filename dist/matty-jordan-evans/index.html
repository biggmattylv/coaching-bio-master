<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matthew Jordan Evans | CoachingBio.com</title>
    <style>
        :root { --primary: #005A9C; --secondary: #A5ACAF; --white: #FFFFFF; --bg: #f8f9fa; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #1a1a1a; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 40px auto; background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        
        /* Hero Section - The Hook (Solid Brand Color) */
        .hero { background: var(--primary); color: white; text-align: center; padding: 80px 40px; }
        .hero h1 { margin: 0; font-size: 3em; font-weight: 800; letter-spacing: -1px; }
        .hero p { margin: 10px 0 0; text-transform: uppercase; letter-spacing: 3px; font-size: 1em; opacity: 0.9; }
        
        /* Content Section */
        .content { padding: 40px; }
        .service-card { border: 1px solid #f0f0f0; padding: 30px; border-radius: 20px; margin-bottom: 20px; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .service-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .service-card h2 { font-size: 1.4em; margin: 0; color: var(--primary); }
        .service-card p { font-size: 1em; color: #555; margin: 10px 0 0; }
        .num { font-weight: 900; color: var(--secondary); font-size: 0.9em; margin-bottom: 10px; display: block; }
        
        /* Action Area */
        .actions { display: flex; gap: 20px; justify-content: center; padding: 40px; }
        .link-btn { padding: 18px 40px; text-align: center; background: var(--primary); color: white; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: background 0.2s; }
        .link-btn:hover { background: #004a80; }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>Matthew Jordan Evans</h1>
            <p>Elite Hitting Coach</p>
        </header>
        
        <main class="content">
            <div class="services">
                <div class="service-card">
                    <span class="num">01.</span>
                    <h2>Personal Hitting Lessons</h2>
                    <p>One-on-one cage sessions to refine your swing mechanics.</p>
                </div>
                <div class="service-card">
                    <span class="num">02.</span>
                    <h2>Group Training</h2>
                    <p>Dynamic group sessions focused on hitting fundamentals.</p>
                </div>
            </div>
            
            <div class="actions">
                <a href="tel:7025265733" class="link-btn">CALL ME</a>
                <a href="mailto:mj1010101369@gmail.com" class="link-btn">EMAIL ME</a>
            </div>
        </main>
    </div>
</body>
</html>
