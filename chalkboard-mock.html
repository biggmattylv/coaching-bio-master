<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalkboard Mock-up | CoachingBio.com</title>
    <style>
        body { background-color: #1a1a1a; padding: 20px; font-family: 'Courier New', Courier, monospace; }
        .chalkboard { 
            max-width: 600px; margin: 0 auto; background-color: #2e4a36; border: 15px solid #5d4037; 
            padding: 40px; color: #e0e0e0; border-radius: 10px; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }
        h1, h2 { text-decoration: underline; color: #fff; }
        .contact-grid { display: flex; justify-content: space-around; margin: 20px 0; border: 1px dashed #fff; padding: 15px; }
        .btn { display: block; border: 2px solid #fff; color: #fff; padding: 10px; margin-top: 10px; text-decoration: none; text-align: center; }
        .about { font-style: italic; border-top: 2px solid #fff; padding-top: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="chalkboard">
        <header style="text-align: center;">
            <h1 style="font-size: 2em;">MATTHEW EVANS</h1>
            <p>BOMB SQUAD MANAGER</p>
        </header>
        
        <div class="contact-grid">
            <div>[CALL]</div>
            <div>[TEXT]</div>
            <div>[EMAIL]</div>
        </div>

        <div>
            <h2>THE PLAYBOOK</h2>
            <a href="#" class="btn">MENTAL GAME</a>
            <a href="#" class="btn">ROUTINE</a>
        </div>

        <div class="about">
            <p>As a player-coach for the Bomb Squad, I bring a dual perspective to the diamond. It's about strategy, battle, and brotherhood.</p>
        </div>
    </div>
</body>
</html>
