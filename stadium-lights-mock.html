<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadium Lights Mock-up | CoachingBio.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Roboto', sans-serif; padding: 20px; }
        .stadium-card { 
            max-width: 600px; margin: 0 auto; background: linear-gradient(145deg, #111, #000);
            border: 2px solid #00d2ff; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            text-align: center;
        }
        .name { font-size: 2.5em; font-weight: 900; letter-spacing: 2px; color: #00d2ff; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 10px rgba(0,210,255,0.5); }
        .title { color: #ffeb3b; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.9em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn { background: #00d2ff; color: #000; padding: 15px; border-radius: 5px; font-weight: 900; text-transform: uppercase; text-decoration: none; display: block; }
        .btn-alt { border: 2px solid #00d2ff; color: #00d2ff; padding: 13px; border-radius: 5px; font-weight: 900; text-transform: uppercase; text-decoration: none; display: block; }
        .about { border-top: 2px solid #333; margin-top: 30px; padding-top: 20px; text-align: left; line-height: 1.6; color: #ccc; }
    </style>
</head>
<body>
    <div class="stadium-card">
        <h1 class="name">MATTHEW EVANS</h1>
        <p class="title">Bomb Squad Manager</p>
        
        <div class="grid">
            <a href="#" class="btn">Call Now</a>
            <a href="#" class="btn">Book Session</a>
        </div>
        
        <div class="about">
            <p>Strategy of the battle. Unbreakable brotherhood. Let's get to work.</p>
            <p><strong>Team:</strong> Los Angeles Dodgers</p>
        </div>
    </div>
</body>
</html>
