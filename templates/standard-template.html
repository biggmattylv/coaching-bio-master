<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{coach_name}} | CoachingBio.com</title>
    <style>
        :root { --primary: #005A9C; --secondary: #A5ACAF; --white: #FFFFFF; --bg: #f8f9fa; --accent: #FFD700; }
        body { font-family: 'Outfit', sans-serif; background: #f0f2f5; color: #1a1a1a; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: var(--white); border-radius: 32px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* Hero Section - The Hook */
        .hero { background: linear-gradient(135deg, #005A9C 0%, #003060 100%); color: white; text-align: center; padding: 80px 40px; }
        .hero h1 { margin: 0; font-size: 2.5em; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .hero p { margin: 5px 0 0; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9em; color: var(--accent); }
        
        /* Content Section */
        .content { padding: 40px; }
        .service-card { border: none; padding: 25px; border-radius: 20px; margin-bottom: 20px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .service-card h2 { font-size: 1.3em; margin: 0; color: #1a1a1a; border-left: 4px solid var(--accent); padding-left: 15px; }
        .service-card p { font-size: 1em; color: #666; margin: 10px 0 0 19px; line-height: 1.6; }
        
        /* Action Area */
        .actions { display: flex; gap: 15px; justify-content: center; padding: 30px; background: #fdfdfd; }
        .link-btn { padding: 18px 30px; text-align: center; background: linear-gradient(to right, #005A9C, #0073e6); color: white; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 1.1em; box-shadow: 0 10px 15px rgba(0,90,156,0.3); transition: transform 0.2s; }
        .link-btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>{{coach_name}}</h1>
            <p>{{coach_title}}</p>
        </header>
        
        <main class="content">
            <div class="services">
                {{services_html}}
            </div>
            
            <div class="actions">
                <a href="tel:{{phone}}" class="link-btn">CALL COACH</a>
                <a href="mailto:{{email}}" class="link-btn">EMAIL ME</a>
            </div>
        </main>
    </div>
</body>
</html>
