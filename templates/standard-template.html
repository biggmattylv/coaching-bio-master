<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{coach_name}} | CoachingBio.com</title>
    <style>
        :root { --primary: #005A9C; --accent: #FFD700; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Hero */
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 2.5em; color: var(--primary); margin: 0; }
        .hero p { font-size: 1.1em; color: #666; margin: 10px 0 0; }
        
        /* Services Section */
        .services-section { margin-bottom: 40px; }
        .service-card { border-bottom: 1px solid #eee; padding: 20px 0; }
        .num { font-weight: 800; color: var(--accent); display: block; margin-bottom: 5px; }
        .service-card h2 { font-size: 1.2em; margin: 0; }
        .service-card p { font-size: 0.95em; color: #666; margin: 5px 0 0; }
        
        /* About Section */
        .about { text-align: center; margin-bottom: 40px; }
        
        /* Action Area */
        .actions { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 18px; text-align: center; border: 2px solid var(--primary); border-radius: 8px; text-decoration: none; font-weight: bold; color: var(--primary); transition: 0.3s; }
        .btn:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>{{coach_name}}</h1>
            <p>{{coach_title}}</p>
        </header>

        <main>
            <div class="services-section">
                {{services_html}}
            </div>

            <div class="about">
                <h2>About Me</h2>
                <p>{{bio_text}}</p>
            </div>

            <div class="actions">
                <a href="tel:{{phone}}" class="btn">CALL COACH</a>
                <a href="mailto:{{email}}" class="btn">EMAIL COACH</a>
            </div>
        </main>
    </div>
</body>
</html>
