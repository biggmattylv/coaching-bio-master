<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneSites Style Mock-up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #333; margin: 0; padding: 0; text-align: center; }
        .hero { padding: 40px 20px; background: #f9f9f9; }
        .avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; }
        h1 { margin: 10px 0; font-size: 1.5em; }
        .bio { max-width: 600px; margin: 0 auto 20px; font-size: 1em; line-height: 1.5; color: #666; }
        .cta-container { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; padding: 0 20px; }
        .cta-btn { background: #007bff; color: white; padding: 15px; border-radius: 5px; text-decoration: none; font-weight: bold; border: none; font-size: 1em; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
        <h1>Matthew Evans</h1>
        <p class="bio">Passionate fitness trainer dedicated to helping individuals achieve their health goals.</p>
    </div>
    
    <div class="cta-container">
        <a href="#" class="cta-btn">Book a Session</a>
        <a href="#" class="cta-btn" style="background: #28a745;">Message Me</a>
        <a href="#" class="cta-btn" style="background: #333;">Visit My Website</a>
    </div>
</body>
</html>
