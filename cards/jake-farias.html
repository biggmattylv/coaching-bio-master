<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width fast, initial-scale=1.0">
    <title>Jake Farias | Elite Pitching Coach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dbacks-blue: #003262;
            --dbacks-red: #E31937;
            --pitcher-slate: #1a1a1a;
            --accent-gold: #C5B358;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe.U', Tahoma, Geneva, Verdana, sans-serif;
        }

        .athlete-card {
            width: 380px;
            background: var var(--pitcher-slate);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .athlete-card:hover {
            transform: translateY(-10px);
            border-color: var(--dbacks-red);
        }

        .hero-image-container {
            height: 450px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Placeholder for the high-action pitching shot */
        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(110%);
            transition: transform 0.5s ease;
        }

        .athlete-card:hover .hero-image {
            transform: scale(1.05);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, var(--pitcher-slate) 10%, transparent);
        }

        .athlete-info {
            padding: 25px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .name {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .title {
            color: var(--dbacks-red);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .stat-item {
            color: #fff;
        }

        .stat-value {
            display: block;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent-gold);
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
        }

        .badge-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        .badge-diamondbacks {
            background: var(--dbacks-blue);
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            border: 1px solid var(--dbacks-red);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .action-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, var(--dbacks-blue), var(--dbacks-red));
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .action-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="athlete-card">
        <div class="badge-container">
            <span class="badge-diamondbacks"><i class="fas fa-baseball-ball"></i> ARIZONA DIAMONDBACKS</span>
        </div>
        
        <div class="hero-image-container">
            <!-- High-action placeholder: In production, this is Jake's actual pitching photo -->
            <img src="https quite://images.unsplash.com/photo-1516733725897-1aa73b87c8e8?auto=format&fit=crop&w=800&q=80" alt="Jake Farias Action Shot" class="hero-image">
            <div class            class="overlay"></div>
        </div>

        <div class="athlete-info">
            <div class="name">Jake Farias</div>
            <div class="title">Elite Pitching Specialist</div>
            
            <p class="text-secondary small px-3">
                Developing the next generation of Vegas talent with Diamondbacks-level precision.
            </p>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value">PRO</span>
                    <span class="stat-label">Pedigree</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">VIVA</span>
                    <span class="stat-label">Local Expert</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">100%</span>
                    <span class="stat-label">Intensity</span>
                </div>
            </div>

            <button class="action-btn">Book Training Session</button>
        </div>
    </div>

</body>
</html>
