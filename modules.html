<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachingBio.com | THE WINNING EDGE LIBRARY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap');
        :root { --primary: #002244; --accent: #FF5E5E; --text: #1a1a1a; --white: #FFFFFF; --bg: #EAEAEA; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .hero { 
            max-width: 800px;
            margin: 0 auto 50px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/Modules Header Image.png'); 
            background-size: cover; background-position: center; color: white; text-align: center; padding: 120px 20px; 
            clip-path: polygon(0% 0%, 100% 0%, 100% 80%, 50% 100%, 0% 80%);
        }
        .hero h1 { font-size: 3.5em; font-weight: 900; text-transform: uppercase; margin: 0; color: #fff; line-height: 1.1; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        
        .tier-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .tier-card { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-bottom: 8px solid var(--accent); text-align: center; }
        .tier-card h3 { font-size: 2em; font-weight: 900; margin: 0 0 15px 0; color: var(--primary); }
        .tier-card .price { font-size: 1.8em; font-weight: 900; color: var(--accent); margin: 15px 0; }
        .btn-tier { display: block; background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        
        .library-section { padding: 40px 0; }
        .library-section h2 { font-size: 2.5em; font-weight: 900; color: var(--primary); margin-bottom: 30px; text-align: center; }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .module-card { 
            background: var(--white); padding: 30px; border-radius: 16px; cursor: pointer; 
            transition: all 0.3s ease; border: 1px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .module-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .module-card h3 { color: var(--primary); font-size: 1.5em; margin: 0; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: white; width: 80%; max-width: 500px; margin: 100px auto; padding: 30px; border-radius: 10px; position: relative; color: #333; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>
    <header class="hero">
        <h1>LEVEL UP<br>YOUR PLAYBOOK</h1>
    </header>

    <div class="container">
        <div class="tier-container">
            <div class="tier-card">
                <h3>ROOKIE</h3>
                <div class="price">FREE</div>
                <a href="/" class="btn-tier">Claim Free Card</a>
            </div>
            <div class="tier-card">
                <h3>ALL STAR</h3>
                <div class="price">$50 + $19.99/mo</div>
                <a href="javascript:void(0)" onclick="alert('Coming Soon!')" class="btn-tier">Upgrade</a>
            </div>
            <div class="tier-card">
                <h3>HALL OF FAME</h3>
                <div class="price">$199.99/mo</div>
                <a href="javascript:void(0)" onclick="alert('Coming Soon!')" class="btn-tier">Go Hall of Fame</a>
            </div>
        </div>
        
        <div class="library-section">
            <h2>THE WINNING EDGE LIBRARY</h2>
            <div class="library-grid" id="library"></div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            <ul id="modal-list" style="text-align: left;"></ul>
        </div>
    </div>

    <script>
        const library = {
            "Hitting": ["Stance", "Power", "Timing", "Mental", "Bunting"],
            "Pitching": ["Fastball", "Mechanics", "Arm Health"],
            "Baseball IQ": ["Situations", "Defense"],
            "Mental Game": ["Focus", "Slumps"],
            "Strength": ["Warmup", "Recovery"],
            "Recruiting": ["Roadmap", "Scouts"],
            "Parent Comm": ["Expectations", "Conflict"],
            "Social Media": ["Brand", "Content"],
            "Operations": ["Practice", "Fundraising"],
            "Video Analysis": ["Swing Mechanics", "Pitching Motion", "Side-by-Side Comparison"],
            "Advanced Analytics": ["Exit Velocity", "Spin Rate", "Launch Angle"],
            "Mindfulness": ["Breathwork", "Visualization", "Pre-Game Routine"]
        };
        const libraryDiv = document.getElementById('library');
        Object.keys(library).forEach(cat => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `<h3>${cat}</h3>`;
            card.onclick = () => openModal(cat);
            libraryDiv.appendChild(card);
        });
        function openModal(cat) {
            document.getElementById('modal-title').innerText = cat;
            document.getElementById('modal-list').innerHTML = library[cat].map(item => `<li>✅ ${item}</li>`).join('');
            document.getElementById('modal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
